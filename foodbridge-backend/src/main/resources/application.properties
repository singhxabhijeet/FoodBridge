# ===== Server =====
server.port=8080

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/foodbridge_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
app.jwt.secret=FoodBridgeSecretKey2024SuperSecureKeyThatIsLongEnough256Bits!!
app.jwt.expiration-ms=86400000

# ===== File Upload =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=d:/React/New folder/FoodBridge/foodbridge-backend/uploads

# ===== CORS =====
app.cors.allowed-origins=http://localhost:4200
